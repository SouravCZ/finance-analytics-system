<!DOCTYPE html>
<html>
<head>
    <title>Finance Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            padding: 20px;
            background-color: #2c3e50;
            color: white;
            margin: 0;
        }

        .filter-form {
            text-align: center;
            margin: 20px;
        }

        .filter-form select, .filter-form button {
            padding: 8px;
            margin: 5px;
        }

        /* KPI Cards */
        .kpi-container {
            display: flex;
            justify-content: space-evenly;
            margin: 20px;
            gap: 20px;
        }

        .kpi-card {
            flex: 1;
            text-align: center;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }

        .kpi-card h3 {
            margin-bottom: 10px;
        }

        .kpi-card p {
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
        }

        /* Dashboard Grid */
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }

        .card h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        img {
            width: 100%;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h1>💰 Finance Analytics Dashboard</h1>

    <!-- FILTER -->
    <form method="POST" class="filter-form">

        <label>Category:</label>
        <select name="category">
            <option>All</option>
            {% for cat in categories %}
                <option value="{{cat}}">{{cat}}</option>
            {% endfor %}
        </select>

        <label>Month:</label>
        <select name="month">
            <option>All</option>
            {% for i in range(1,13) %}
                <option value="{{i}}">{{i}}</option>
            {% endfor %}
        </select>

        <button type="submit">Apply Filters</button>

    </form>

    <!-- KPI CARDS -->
    <div class="kpi-container">

        <div class="kpi-card">
            <h3>Total Spending</h3>
            <p>₹ {{ total_spend }}</p>
        </div>

        <div class="kpi-card">
            <h3>Average Transaction</h3>
            <p>₹ {{ avg_spend }}</p>
        </div>

        <div class="kpi-card">
            <h3>Total Transactions</h3>
            <p>{{ total_transactions }}</p>
        </div>

    </div>

    <!-- DASHBOARD -->
    <div class="container">

        <div class="card">
            <h2>Category Spending</h2>
            <img src="{{ url_for('static', filename='category.png') }}">
        </div>

        <div class="card">
            <h2>Monthly Trend</h2>
            <img src="{{ url_for('static', filename='monthly.png') }}">
        </div>

        <div class="card">
            <h2>Weekend vs Weekday</h2>
            <img src="{{ url_for('static', filename='weekend.png') }}">
        </div>

        <div class="card">
            <h2>High Value Transactions</h2>
            <img src="{{ url_for('static', filename='highvalue.png') }}">
        </div>

    </div>

</body>
</html>
